<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Kalashi Barber Shop | Loja Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');
        .font-serif-kalashi { font-family: 'Cinzel', 'Georgia', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white text-black font-sans antialiased selection:bg-black selection:text-white overflow-x-hidden pb-16">

    <div class="fixed bottom-6 left-6 z-50 flex flex-col gap-3">
        <a href="https://www.instagram.com/kalashibarbershop?igsh=MXc3aXZtOHZpMjN5aQ==" target="_blank" rel="noopener noreferrer" class="bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all duration-300">
            <i class="fab fa-instagram text-3xl"></i>
        </a>
        <a href="https://wa.me/5513998058590" target="_blank" rel="noopener noreferrer" class="bg-[#25D366] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all duration-300">
            <i class="fab fa-whatsapp text-3xl"></i>
        </a>
    </div>

    <header class="border-b border-gray-200 bg-white/90 backdrop-blur-md sticky top-0 z-40 w-full">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2.5 flex justify-between items-center gap-4">
            
            <div id="area-auth-topo" class="flex items-center gap-3 text-xs font-bold uppercase tracking-wider">
                </div>

            <div class="flex items-center gap-2 sm:gap-3 shrink-0 cursor-pointer" onclick="window.location.reload();">
                <div class="w-12 h-12 sm:w-14 sm:h-14 bg-white rounded-full flex items-center justify-center p-0.5">
                    <svg viewBox="0 0 500 500" class="w-full h-full text-black" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="250" cy="250" r="240" fill="white" />
                        <rect x="50" y="150" width="40" height="200" rx="8" fill="none" stroke="black" stroke-width="16" />
                        <path d="M52 190 L88 160 M52 240 L88 210 M52 290 L88 260 M52 340 L88 310" stroke="black" stroke-width="12" stroke-linecap="round" />
                        <path d="M70 115 C88 115 88 150 70 150 C52 150 52 115 70 115 Z" fill="black" />
                        <path d="M50 350 L90 350 L82 380 L58 380 Z" fill="black" />
                        <text x="110" y="225" font-family="'Cinzel', 'Georgia', serif" font-size="62" font-weight="900" letter-spacing="-1" fill="black">KALASHI</text>
                        <text x="110" y="315" font-family="'Cinzel', 'Georgia', serif" font-size="84" font-weight="900" letter-spacing="1" fill="black">BARBER</text>
                        <text x="112" y="370" font-family="'Courier New', monospace" font-size="28" font-weight="bold" letter-spacing="12" fill="black">SHOP</text>
                    </svg>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="abrirRastreio()" class="text-xs uppercase tracking-widest font-bold text-gray-600 hover:text-black transition">
                    Rastrear
                </button>
                <a href="#produtos" class="bg-black text-white px-4 py-2 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-gray-800 transition shadow-sm">
                    Loja
                </a>
            </div>
            
        </div>
    </header>

    <div id="modal-auth" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full border border-gray-100 shadow-2xl relative">
            <button onclick="fecharModalAuth()" class="absolute top-4 right-4 text-gray-400 hover:text-black text-lg">
                <i class="fas fa-times"></i>
            </button>
            
            <div class="flex border-b border-gray-200 mb-6 text-sm font-bold uppercase tracking-wider">
                <button id="btn-aba-login" onclick="mudarAbaAuth('login')" class="flex-1 pb-3 text-black border-b-2 border-black">Entrar</button>
                <button id="btn-aba-cadastro" onclick="mudarAbaAuth('cadastro')" class="flex-1 pb-3 text-gray-400 border-b-2 border-transparent">Criar Conta</button>
            </div>

            <form id="form-login" onsubmit="executarLogin(event)" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-wider text-gray-500">E-mail</label>
                    <input type="email" id="login-email" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-black">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-wider text-gray-500">Senha</label>
                    <input type="password" id="login-senha" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-black">
                </div>
                <button type="submit" class="w-full bg-black text-white text-xs uppercase tracking-widest font-bold py-3.5 rounded-xl mt-2 hover:bg-gray-800 transition">Entrar no Sistema</button>
            </form>

            <form id="form-cadastro" onsubmit="executarCadastro(event)" class="space-y-4 hidden">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-wider text-gray-500">Nome Completo</label>
                    <input type="text" id="cad-nome" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-black">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-wider text-gray-500">E-mail</label>
                    <input type="email" id="cad-email" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-black">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-wider text-gray-500">Criar Senha</label>
                    <input type="password" id="cad-senha" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-black">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-wider text-gray-500">Endereço de Entrega Principal</label>
                    <input type="text" id="cad-endereco" required placeholder="Ex: Rua das Flores, 123 - Centro" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-black">
                </div>
                <button type="submit" class="w-full bg-black text-white text-xs uppercase tracking-widest font-bold py-3.5 rounded-xl mt-2 hover:bg-gray-800 transition">Criar Minha Conta</button>
            </form>
        </div>
    </div>

    <div id="conteudo-principal">
        <section class="bg-gray-50 border-b border-gray-100 py-12 sm:py-16 text-center px-4 w-full">
            <div class="max-w-3xl mx-auto">
                <span class="inline-block text-[10px] uppercase tracking-widest bg-black text-white px-3 py-1 rounded-full font-bold shadow-sm">Produtos Profissionais & Premium</span>
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-serif-kalashi font-black mt-6 mb-4 tracking-tight uppercase leading-tight text-gray-900">Loja Online para Homens & Barbeiros</h1>
                <p class="text-gray-600 text-sm max-w-xl mx-auto mb-8">Equipamentos de alta performance e cuidados pessoais com envio rápido para todo o Brasil.</p>
            </div>
        </section>

        <main id="produtos" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 lg:gap-8">
                </div>
        </main>
    </div>

    <script>
        const produtosDB = {
            1: { id: 1, categoria: "Equipamentos", nome: "Máquina de Cortar Cabelo Profissional", preco: 249.90, descontoVista: 10, parcelasMax: 6, icone: "fa-scissors", desc: "A Máquina de Cortar Cabelo Profissional Kalashi oferece o mais alto nível de precisão exigido por barbeiros de ponta." },
            2: { id: 2, categoria: "Estilo", nome: "Pomada Modeladora Efeito Matte", preco: 45.00, descontoVista: 5, parcelasMax: 3, icone: "fa-jar", desc: "Desenvolvida com exclusividade para a linha Kalashi, nossa pomada modeladora de efeito matte confere alta fixação." },
            3: { id: 3, categoria: "Cuidados", nome: "Shampoo Premium Barba & Cabelo", preco: 39.90, descontoVista: 5, parcelasMax: 3, icone: "fa-soap", desc: "Fórmula revigorante enriquecida com extratos naturais e óleo de menta." },
            4: { id: 4, categoria: "Equipamentos", nome: "Tesoura Fio Laser Profissional", preco: 120.00, descontoVista: 10, parcelasMax: 4, icone: "fa-cut", desc: "A ferramenta indispensável para acabamentos geométricos e cortes retos perfeitos." }
        };

        let usuarioLogado = null;
        let produtoAtual = null;
        let quantidadeAtual = 1;
        let custoFrete = 0;

        // SISTEMA DE CONTROLE DE SESSÃO (30 DIAS)
        function checarSessao() {
            const sessao = localStorage.getItem('kalashi_session');
            if (sessao) {
                const dados = JSON.parse(sessao);
                if (Date.now() < dados.expiraEm) {
                    usuarioLogado = dados.user;
                } else {
                    localStorage.removeItem('kalashi_session');
                }
            }
            renderizarComponentesAuth();
        }

        function salvarSessao(usuario) {
            const trintaDias = 30 * 24 * 60 * 60 * 1000;
            const dadosSessao = {
                user: usuario,
                expiraEm: Date.now() + trintaDias
            };
            localStorage.setItem('kalashi_session', JSON.stringify(dadosSessao));
            usuarioLogado = usuario;
            renderizarComponentesAuth();
        }

        function renderizarComponentesAuth() {
            const container = document.getElementById('area-auth-topo');
            if (usuarioLogado) {
                container.innerHTML = `
                    <span class="text-gray-900"><i class="fas fa-user mr-1"></i> Olá, ${usuarioLogado.nome.split(' ')[0]}</span>
                    <button onclick="executarLogout()" class="text-red-600 hover:underline">Sair</button>
                `;
            } else {
                container.innerHTML = `
                    <button onclick="abrirModalAuth('login')" class="text-gray-600 hover:text-black">Entrar</button>
                    <span class="text-gray-300">|</span>
                    <button onclick="abrirModalAuth('cadastro')" class="text-gray-600 hover:text-black">Criar Conta</button>
                `;
            }
        }

        // GERENCIAMENTO DO MODAL
        function abrirModalAuth(aba = 'login') {
            document.getElementById('modal-auth').classList.remove('hidden');
            mudarAbaAuth(aba);
        }
        function fecharModalAuth() {
            document.getElementById('modal-auth').classList.add('hidden');
        }
        function mudarAbaAuth(aba) {
            if (aba === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-cadastro').classList.add('hidden');
                document.getElementById('btn-aba-login').className = "flex-1 pb-3 text-black border-b-2 border-black";
                document.getElementById('btn-aba-cadastro').className = "flex-1 pb-3 text-gray-400 border-b-2 border-transparent";
            } else {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-cadastro').classList.remove('hidden');
                document.getElementById('btn-aba-login').className = "flex-1 pb-3 text-gray-400 border-b-2 border-transparent";
                document.getElementById('btn-aba-cadastro').className = "flex-1 pb-3 text-black border-b-2 border-black";
            }
        }

        // CADASTRO E LOGIN LOCAL STORAGE
        function executarCadastro(e) {
            e.preventDefault();
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            const endereco = document.getElementById('cad-endereco').value;

            const usuariosCadastrados = JSON.parse(localStorage.getItem('kalashi_users') || '[]');
            if (usuariosCadastrados.find(u => u.email === email)) {
                alert("Este e-mail já está cadastrado.");
                return;
            }

            const novoUsuario = { nome, email, senha, endereco };
            usuariosCadastrados.push(novoUsuario);
            localStorage.setItem('kalashi_users', JSON.stringify(usuariosCadastrados));

            alert("Conta criada com sucesso!");
            salvarSessao(novoUsuario);
            fecharModalAuth();
            if (produtoAtual) verProduto(produtoAtual.id);
        }

        function executarLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            const usuariosCadastrados = JSON.parse(localStorage.getItem('kalashi_users') || '[]');
            const usuario = usuariosCadastrados.find(u => u.email === email && u.senha === senha);

            if (!usuario) {
                alert("E-mail ou senha incorretos.");
                return;
            }

            salvarSessao(usuario);
            fecharModalAuth();
            if (produtoAtual) verProduto(produtoAtual.id);
        }

        function executarLogout() {
            localStorage.removeItem('kalashi_session');
            usuarioLogado = null;
            window.location.reload();
        }

        // RENDERIZAR VITRINE
        function renderizarVitrine() {
            const grid = document.querySelector('#produtos > div');
            grid.innerHTML = '';
            Object.values(produtosDB).forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition flex flex-col justify-between">
                        <div class="bg-gray-50 h-48 rounded-xl flex items-center justify-center mb-4 cursor-pointer" onclick="tentarVerProduto(${p.id})">
                            <i class="fas ${p.icone} text-5xl text-gray-400"></i>
                        </div>
                        <div>
                            <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">${p.categoria}</span>
                            <h3 class="text-base font-bold font-serif-kalashi mt-1 mb-2">${p.nome}</h3>
                        </div>
                        <div class="mt-4">
                            <div class="text-xl font-black font-serif-kalashi mb-3">R$ ${p.preco.toFixed(2)}</div>
                            <button onclick="tentarVerProduto(${p.id})" class="w-full bg-black text-white text-center py-3 rounded-xl text-xs uppercase tracking-widest font-bold block transition active:scale-95">
                                Comprar
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function tentarVerProduto(id) {
            produtoAtual = produtosDB[id];
            if (!usuarioLogado) {
                alert("Para realizar compras e ver os detalhes, é necessário estar conectado.");
                abrirModalAuth('cadastro');
                return;
            }
            verProduto(id);
        }

        function verProduto(id) {
            const precoAVista = (produtoAtual.preco * (1 - produtoAtual.descontoVista/100)).toFixed(2);
            const valorParcela = (produtoAtual.preco / produtoAtual.parcelasMax).toFixed(2);

            document.getElementById('conteudo-principal').innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-8 w-full">
                    <button onclick="window.location.reload();" class="mb-6 flex items-center gap-2 text-xs uppercase tracking-widest font-bold text-gray-500 hover:text-black transition">
                        <i class="fas fa-arrow-left"></i> Voltar
                    </button>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div class="bg-gray-50 border border-gray-200 rounded-3xl h-72 sm:h-96 flex flex-col items-center justify-center p-6 text-center">
                            <i class="fas ${produtoAtual.icone} text-7xl text-black mb-4"></i>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <span class="text-xs uppercase tracking-widest bg-black text-white px-3 py-1 rounded-full font-bold">${produtoAtual.categoria}</span>
                                <h1 class="text-2xl sm:text-3xl font-serif-kalashi font-black text-gray-900 mt-3">${produtoAtual.nome}</h1>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <div class="text-3xl font-black font-serif-kalashi text-black">R$ ${produtoAtual.preco.toFixed(2)}</div>
                                <div class="text-sm font-bold text-green-600 mt-1">R$ ${precoAVista} à vista com desconto no PIX</div>
                                <div class="text-xs text-gray-600 mt-2 border-t border-gray-200 pt-2">Ou até ${produtoAtual.parcelasMax}x de R$ ${valorParcela} sem juros</div>
                            </div>
                            <div class="border border-gray-200 rounded-2xl p-4 space-y-3">
                                <h4 class="text-xs uppercase tracking-widest font-bold text-gray-700"><i class="fas fa-truck mr-1"></i> Endereço de Entrega Salvo</h4>
                                <div class="text-sm text-gray-700 bg-gray-50 p-3 rounded-xl border border-gray-200">${usuarioLogado.endereco}</div>
                            </div>
                            <button onclick="finalizarPedidoCheckout()" class="w-full bg-black text-white py-4 rounded-xl text-xs uppercase tracking-widest font-bold transition active:scale-95">
                                Confirmar e Finalizar Pedido
                            </button>
                        </div>
                    </div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        function finalizarPedidoCheckout() {
            const numeroPedido = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('conteudo-principal').innerHTML = `
                <div class="max-w-md mx-auto px-4 py-16 text-center space-y-6">
                    <div class="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center mx-auto text-2xl shadow-lg"><i class="fas fa-check"></i></div>
                    <h2 class="text-2xl font-serif-kalashi font-black uppercase tracking-wide">Pedido Realizado!</h2>
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 text-left text-sm space-y-2">
                        <div><strong>Código de Rastreio:</strong> <span class="font-mono bg-gray-200 px-2 py-0.5 rounded">KL-${numeroPedido}-BR</span></div>
                        <div><strong>Entregar em:</strong> ${usuarioLogado.endereco}</div>
                    </div>
                    <button onclick="window.location.reload();" class="w-full bg-black text-white font-bold text-xs uppercase tracking-widest py-3 rounded-xl transition">Voltar ao Início</button>
                </div>
            `;
        }

        // Inicialização do Sistema
        checarSessao();
        renderizarVitrine();
    </script>
</body>
</html>
